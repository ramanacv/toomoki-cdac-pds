version: '3.9'

networks:
  pds-fabric:
    name: pds-fabric

services:
  orderer.pds.example.com:
    profiles: [fabric]
    image: hyperledger/fabric-orderer:2.5.13
    container_name: orderer.pds.example.com
    environment:
      - ORDERER_GENERAL_LOGLEVEL=info
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    ports:
      - '7050:7050'
      - '7053:7053'
    volumes:
      - ./crypto/ordererOrganizations/pds.example.com/orderers/orderer.pds.example.com:/var/hyperledger/orderer
    networks:
      - pds-fabric

  peer0.food.example.com:
    profiles: [fabric]
    image: hyperledger/fabric-peer:2.5.13
    container_name: peer0.food.example.com
    environment:
      - CORE_PEER_ID=peer0.food.example.com
      - CORE_PEER_ADDRESS=peer0.food.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.food.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_LOCALMSPID=FoodAndCivilSuppliesMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${PDS_COUCHDB_USER:-pds_couch}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${PDS_COUCHDB_PASSWORD:-changeme-couch}
    ports:
      - '7051:7051'
    volumes:
      - ./crypto/peerOrganizations/food.example.com/peers/peer0.food.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto/peerOrganizations/food.example.com/peers/peer0.food.example.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - couchdb0
    networks:
      - pds-fabric

  peer0.godown.example.com:
    profiles: [fabric]
    image: hyperledger/fabric-peer:2.5.13
    container_name: peer0.godown.example.com
    environment:
      - CORE_PEER_ID=peer0.godown.example.com
      - CORE_PEER_ADDRESS=peer0.godown.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.godown.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_LOCALMSPID=GodownWarehouseMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${PDS_COUCHDB_USER:-pds_couch}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${PDS_COUCHDB_PASSWORD:-changeme-couch}
    ports:
      - '9051:9051'
    volumes:
      - ./crypto/peerOrganizations/godown.example.com/peers/peer0.godown.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto/peerOrganizations/godown.example.com/peers/peer0.godown.example.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - couchdb1
    networks:
      - pds-fabric

  couchdb0:
    profiles: [fabric]
    image: couchdb:3.4
    container_name: couchdb0
    environment:
      - COUCHDB_USER=${PDS_COUCHDB_USER:-pds_couch}
      - COUCHDB_PASSWORD=${PDS_COUCHDB_PASSWORD:-changeme-couch}
    # No host port published — CouchDB is reachable only on the pds-fabric
    # network (peers connect via couchdb0:5984). Exposing 5984 to the host
    # would leak the state DB. Remove this comment only if you explicitly need
    # host access for debugging.
    networks:
      - pds-fabric

  couchdb1:
    profiles: [fabric]
    image: couchdb:3.4
    container_name: couchdb1
    environment:
      - COUCHDB_USER=${PDS_COUCHDB_USER:-pds_couch}
      - COUCHDB_PASSWORD=${PDS_COUCHDB_PASSWORD:-changeme-couch}
    networks:
      - pds-fabric

  ca.food.example.com:
    profiles: [fabric]
    image: hyperledger/fabric-ca:1.5.15
    container_name: ca.food.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-food
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - '7054:7054'
    volumes:
      - ./crypto/fabric-ca/food:/etc/hyperledger/fabric-ca-server
    networks:
      - pds-fabric

  ca.godown.example.com:
    profiles: [fabric]
    image: hyperledger/fabric-ca:1.5.15
    container_name: ca.godown.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-godown
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - '8054:8054'
    volumes:
      - ./crypto/fabric-ca/godown:/etc/hyperledger/fabric-ca-server
    networks:
      - pds-fabric
