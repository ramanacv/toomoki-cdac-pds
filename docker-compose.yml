services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pds_chain
      POSTGRES_USER: pds
      POSTGRES_PASSWORD: pds
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      PDS_PERSISTENCE_BACKEND: file
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '4173:4173'
    depends_on:
      - api

volumes:
  postgres_data:
